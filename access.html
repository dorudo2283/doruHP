<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入り方 - DORUDO SERVER</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; line-height: 1.8; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; }
    .step { background: #eee; padding: 5px 12px; border-radius: 5px; font-weight: bold; margin-right: 5px; }
    .info-box { background: #fffde7; border: 1px solid #fff59d; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
    .back-btn { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>サーバーへの参加方法</h1>
    
    <p><span class="step">1</span> 「認証コード発行」ページでコードを取得する。</p>
    <p><span class="step">2</span> マイクラのサーバー追加画面で以下を入力。</p>
    
    <div class="info-box">
      <strong>IPアドレス:</strong> (ここにあなたのサーバーIPを記入)<br>
      <strong>ポート:</strong> (ここにポート番号を記入)
    </div>

    <p><span class="step">3</span> 接続後、画面の指示に従ってコードを入力してください。</p>

    <a href="index.html" class="back-btn">← ホームに戻る</a>
  </div>
</body>
</html>
