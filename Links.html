<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リンク集 - DORUDO SERVER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f7ff; padding-top: 80px; color: #333; }
        
        /* ヘッダー・サイドメニュー（共通設定） */
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        .menu-btn { font-size: 24px; cursor: pointer; width: 40px; }
        .header-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 18px; text-decoration: none; color: #fff; }
        .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111; color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; box-sizing: border-box; }
        .side-menu.open { left: 0; }
        .side-menu a { display: block; padding: 15px 25px; color: white; text-decoration: none; font-size: 14px; border-bottom: 1px solid #333; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.show { display: block; }

        /* コンテンツエリア */
        .container { width: 92%; max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 30px; color: #111; }
        
        /* リンクカードのデザイン */
        .link-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #ddd; }
        .link-banner { width: 100%; height: auto; display: block; border-bottom: 1px solid #eee; }
        .link-content { padding: 20px; }
        .link-name { font-size: 18px; font-weight: bold; color: #007bff; margin-bottom: 8px; display: block; text-decoration: none; }
        .link-url { font-size: 13px; color: #888; word-break: break-all; font-family: monospace; background: #f8f9fa; padding: 10px; border-radius: 8px; display: block; margin-top: 10px; text-decoration: none; }
        .link-url:hover { color: #007bff; background: #eef7ff; }

        /* シンプルなテキストリンク用 */
        .simple-link { background: white; padding: 15px 20px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #333; margin-bottom: 12px; border: 1px solid #ddd; }
        .simple-link:hover { border-color: #007bff; }

        .back-link { display: block; text-align: center; margin: 40px 0; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <a href="index.html">トップ</a>
        <a href="updates.html">アプデ情報</a>
        <a href="Num.html">認証コード発行</a>
        <a href="access.html">鯖の入り方・情報</a>
        <a href="rules.html">ルール</a>
        <a href="Q.html">よくある質問</a>
        <a href="GofList.html">ワールド一覧</a>
        <a href="members.html">メンバー紹介</a>
        <a href="Admin.html">管理者パネル</a>
    </div>

    <div class="header-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <a href="index.html" class="header-title">DORUDO SERVER</a>
        <div style="width: 40px;"></div>
    </div>

    <div class="container">
        <h1>リンク集</h1>

        <div class="link-card">
            <div class="link-content">
                <a href="https://dorudo2283.github.io/doruHP/" class="link-name">ドル鯖公式HP</a>
                <p style="font-size: 14px; color: #666; margin: 0;">ドル鯖のメインポータルサイトです。</p>
                <a href="https://dorudo2283.github.io/doruHP/" class="link-url">https://dorudo2283.github.io/doruHP/</a>
            </div>
        </div>
         <div class="link-card">
            <a href="https://crafters-colony.jp/dorudo">
                <img src="Colony.png" alt="クラフターズコロニー" class="link-banner">
            </a>
            <div class="link-content">
                <a href="https://minecraft-mcworld.com/author/93dc31d6bf445963824dcf200048ef2bfb6f5303/" class="link-name">クラフターズコロニー</a>
                <p style="font-size: 14px; color: #666; margin: 0;">ドル鯖の配布・詳細情報が掲載されている外部サイトです。</p>
                <a href="https://minecraft-mcworld.com/author/93dc31d6bf445963824dcf200048ef2bfb6f5303/" class="link-url">https://minecraft-mcworld.com/author/93dc31d6bf445963824dcf200048ef2bfb6f5303//a>
            </div>
        </div>

        <a href="index.html" class="back-link">トップに戻る</a>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
    </script>
</body>
</html>
