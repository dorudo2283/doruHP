<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理者ページ - DORUDO SERVER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff5f5; padding-top: 80px; color: #333; }
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #d32f2f; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .header-title { font-weight: bold; font-size: 18px; text-decoration: none; color: #fff; }
        .container { width: 92%; max-width: 400px; margin: 0 auto; text-align: center; }

        /* ログイン */
        #loginSection { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #ffcdd2; }
        .input-style { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 20px; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; }
        .btn-red { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #d32f2f; color: white; font-weight: bold; cursor: pointer; }

        /* 検証エリア */
        #adminContent { display: none; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .verify-label { display: block; font-size: 14px; font-weight: bold; color: #666; margin-bottom: 15px; }
        
        /* 判定表示 */
        #resultDisplay {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .status-waiting { color: #888; background: #f5f5f5; }
        .status-success { color: #2e7d32; background: #e8f5e9; border: 2px solid #2e7d32; } /* 認証可 */
        .status-error { color: #d32f2f; background: #ffebee; border: 2px solid #d32f2f; }   /* 認証不可 */
    </style>
</head>
<body>

    <div class="header-bar">
        <span class="header-title">管理者ページ</span>
    </div>

    <div class="container">
        <div id="loginSection">
            <h2>認証コードチェッカー</h2>
            <input type="password" id="adminPass" class="input-style" placeholder="Password">
            <button class="btn-red" onclick="checkLogin()">Login</button>
        </div>

        <div id="adminContent">
            <label class="verify-label">認証コードを入力</label>
            <input type="text" id="checkInput" class="input-style" placeholder="00000-XXXXXX" oninput="runCheck()">

            <div id="resultDisplay" class="status-waiting">入力待ち...</div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin";

        function checkLogin() {
            if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                showAdmin();
            } else { alert("Password Error"); }
        }

        window.onload = function() {
            if (sessionStorage.getItem('isAdmin') === 'true') showAdmin();
        };

        function showAdmin() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }

        function runCheck() {
            const userInput = document.getElementById('checkInput').value.trim().toUpperCase();
            const result = document.getElementById('resultDisplay');

            // Num.htmlで発行され、localStorageに保存されている「正解」を取得
            const correctCode = localStorage.getItem('doru_auth_code');

            // 入力中
            if (userInput.length === 0) {
                result.innerText = "入力待ち...";
                result.className = "status-waiting";
                return;
            }

            // 照合（ Num.htmlの発行形式と完全一致するか ）
            if (userInput === correctCode) {
                result.innerText = "認証可";
                result.className = "status-success";
            } else {
                result.innerText = "認証不可";
                result.className = "status-error";
            }
        }
    </script>
</body>
</html>
