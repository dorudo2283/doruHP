<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理者パネル - DORUDO SERVER</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f7ff; padding-top: 80px; text-align: center; color: #333; line-height: 1.6; }
        
        /* ヘッダー・サイドメニュー（他の全ページと完全一致） */
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        .menu-btn { font-size: 24px; cursor: pointer; width: 40px; }
        .header-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 18px; text-decoration: none; color: #fff; }
        .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111; color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; box-sizing: border-box; }
        .side-menu.open { left: 0; }
        .side-menu a { display: block; padding: 15px 25px; color: white; text-decoration: none; font-size: 14px; border-bottom: 1px solid #333; text-align: left; } /* 🔵 完全に同一の左寄せ、余白に統一 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.show { display: block; }
        
        /* コンテンツエリア */
        .container { width: 92%; max-width: 460px; margin: 0 auto; padding-bottom: 50px; }
        h1 { font-size: 26px; text-align: center; margin-bottom: 30px; color: #111; }
        
        /* カードデザイン */
        .section-card { background: white; padding: 35px 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; box-sizing: border-box; }
        .section-card h2 { font-size: 20px; margin: 0 0 25px 0; color: #111; font-weight: bold; }
        
        /* 入力フォーム */
        .input-style { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #cbd5e1; background: #f8fafc; margin-bottom: 20px; box-sizing: border-box; font-size: 18px; text-align: center; font-weight: 600; transition: 0.2s; }
        .input-style:focus { background: #fff; border-color: #007bff; outline: none; }
        
        /* ボタン設定 */
        .btn-admin { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #007bff; color: white; font-weight: 700; font-size: 15px; cursor: pointer; transition: background 0.2s; }
        .btn-admin:hover { background: #0056b3; }
        
        #loginSection { display: block; }
        #adminContent { display: none; }
        
        /* ステータスボックス表示 */
        .result-box { margin-top: 25px; font-size: 16px; font-weight: 700; padding: 18px; border-radius: 12px; border: 1px solid transparent; }
        .status-waiting { color: #64748b; background: #f1f5f9; border-color: #e2e8f0; }
        .status-success { color: #007bff; background: #e0f2fe; border-color: #bae6fd; }
        .status-error { color: #d32f2f; background: #fff4f4; border-left: 4px solid #d32f2f; border-radius: 4px; }

        .back-link { display: block; text-align: center; margin: 30px 0; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <a href="index.html">トップ</a>
        <a href="updates.html">アプデ情報</a>
        <a href="Num.html">認証コード発行</a>
        <a href="access.html">鯖の入り方・情報</a>
        <a href="rules.html">ルール</a>
        <a href="Q.html">よくある質問</a>
        <a href="GofList.html">ワールド一覧</a>
        <a href="members.html">メンバー紹介</a>
        <a href="Admin.html">管理者パネル</a>
    </div>

    <div class="header-bar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <a href="index.html" class="header-title">DORUDO SERVER</a>
        <div style="width: 40px;"></div>
    </div>

    <div class="container">
        <h1>管理者パネル</h1>

        <div id="loginSection" class="section-card">
            <h2>管理者ページへログイン</h2>
            <input type="password" id="adminPass" class="input-style" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') checkLogin()">
            <button class="btn-admin" onclick="checkLogin()">ログイン</button>
        </div>

        <div id="adminContent" class="section-card">
            <h2>認証コード確認</h2>
            <input type="text" id="checkInput" class="input-style" placeholder="000-000" maxlength="7" oninput="validateMatrix6Code()">
            <div id="resultDisplay" class="result-box status-waiting">コードの入力待ち...</div>
        </div>
        
        <a href="index.html" class="back-link">トップに戻る</a>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        const ADMIN_PASSWORD = "dorugy";

        function checkLogin() {
            if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } else { 
                alert("パスワードが違います"); 
            }
        }
        
        function validateMatrix6Code() {
            const input = document.getElementById('checkInput').value.trim();
            const result = document.getElementById('resultDisplay');

            if (input.length === 0) {
                result.innerText = "コードの入力待ち...";
                result.className = "result-box status-waiting";
                return;
            }

            const regex = /^([0-9]{3})-([0-9]{3})$/;
            const match = input.match(regex);

            if (match) {
                const head = match[1];
                const tail = match[2];

                const n1 = parseInt(head[0]);
                const n2 = parseInt(head[1]);
                const n3 = parseInt(head[2]);

                const t1 = parseInt(tail[0]);
                const t2 = parseInt(tail[1]);
                const t3 = parseInt(tail[2]);

                const check1 = (n1 + n2) % 10 === t1;
                const check2 = (n2 + n3) % 10 === t2;
                const check3 = (t1 + t2 + n3) % 10 === t3;

                if (check1 && check2 && check3) {
                    result.innerText = "認証可（コード一致：本物）";
                    result.className = "result-box status-success";
                    return;
                }
            }
            
            result.innerText = "認証不可（不正なコード）";
            result.className = "result-box status-error";
        }
    </script>
</body>
</html>
