<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理者パネル - DORUDO SERVER</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; padding-top: 80px; text-align: center; }
    .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
    .menu-btn { font-size: 24px; cursor: pointer; }
    .header-title { font-weight: 700; font-size: 16px; color: #fff; text-decoration: none; }
    .container { width: 92%; max-width: 460px; margin: 40px auto; }
    .card { background: white; padding: 35px 30px; border-radius: 24px; border: 1px solid #e5e5e5; box-shadow: 0 4px 20px rgba(0,0,0,0.02); box-sizing: border-box; }
    .card h2 { font-size: 20px; margin: 0 0 25px 0; letter-spacing: 1px; }
    .input-style { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #e0e0e0; background: #f9f9f9; margin-bottom: 20px; box-sizing: border-box; font-size: 18px; text-align: center; font-weight: 600; letter-spacing: 1px; }
    .input-style:focus { background: #fff; border-color: #111; outline: none; }
    .btn-admin { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #111; color: white; font-weight: 600; font-size: 15px; cursor: pointer; }
    #loginSection { display: block; }
    #adminContent { display: none; }
    .result-box { margin-top: 25px; font-size: 18px; font-weight: 700; padding: 18px; border-radius: 12px; }
    .status-waiting { color: #666; background: #f5f5f5; border: 1px solid #e0e0e0; }
    .status-success { color: #0052cc; background: #e6f0fa; border: 1px solid #c8def5; }
    .status-error { color: #d32f2f; background: #ffebee; border: 1px solid #ffcdd2; }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="menu-btn">☰</div>
    <a href="index.html" class="header-title">DORUDO SERVER</a>
    <div style="width: 40px;"></div>
  </div>

  <div class="container">
    <div id="loginSection" class="card">
        <h2>ADMIN LOGIN</h2>
        <input type="password" id="adminPass" class="input-style" placeholder="パスワードを入力">
        <button class="btn-admin" onclick="checkLogin()">ログイン</button>
    </div>

    <div id="adminContent" class="card">
        <h2>CODE VALIDATOR</h2>
        <input type="text" id="checkInput" class="input-style" placeholder="000-000" maxlength="7" oninput="validateMatrix6Code()">
        <div id="resultDisplay" class="result-box status-waiting">コードの入力待ち...</div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "dorugy";

    function checkLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        } else { alert("パスワードが違います"); }
    }
    
    function validateMatrix6Code() {
        const input = document.getElementById('checkInput').value.trim();
        const result = document.getElementById('resultDisplay');

        if (input.length === 0) {
            result.innerText = "コードの入力待ち...";
            result.className = "result-box status-waiting";
            return;
        }

        // 6桁形式チェック (3桁-3桁の数字)
        const regex = /^([0-9]{3})-([0-9]{3})$/;
        const match = input.match(regex);

        if (match) {
            const head = match[1];
            const tail = match[2];

            const n1 = parseInt(head[0]);
            const n2 = parseInt(head[1]);
            const n3 = parseInt(head[2]);

            const t1 = parseInt(tail[0]);
            const t2 = parseInt(tail[1]);
            const t3 = parseInt(tail[2]);

            // 6桁マトリクス格子暗号の逆算検証
            const check1 = (n1 + n2) % 10 === t1;
            const check2 = (n2 + n3) % 10 === t2;
            const check3 = (t1 + t2 + n3) % 10 === t3;

            if (check1 && check2 && check3) {
                result.innerText = "認証可（コード一致：本物）";
                result.className = "result-box status-success";
                return;
            }
        }
        
        result.innerText = "認証不可（不正なコード）";
        result.className = "result-box status-error";
    }
  </script>
</body>
</html>
