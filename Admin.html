<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN - DORUDO SERVER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff5f5; padding-top: 80px; color: #333; }
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #d32f2f; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .header-title { font-weight: bold; font-size: 18px; text-decoration: none; color: #fff; }
        .container { width: 92%; max-width: 400px; margin: 0 auto; text-align: center; }

        /* セクション共通 */
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #ffcdd2; }
        .input-style { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 20px; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; transition: 0.2s; }
        .input-style:focus { border-color: #d32f2f; }
        
        .btn-red { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #d32f2f; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* 管理エリア（初期非表示） */
        #adminContent { display: none; }
        
        /* 判定表示 */
        #resultDisplay {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .status-waiting { color: #888; background: #f5f5f5; }
        .status-success { color: #2e7d32; background: #e8f5e9; border: 2px solid #2e7d32; } /* 認証可 */
        .status-error { color: #d32f2f; background: #ffebee; border: 2px solid #d32f2f; }   /* 認証不可 */
    </style>
</head>
<body>

    <div class="header-bar">
        <span class="header-title">管理者ページ</span>
    </div>

    <div class="container">
        <div id="loginSection" class="card">
            <h2 style="margin-top:0;">管理者パスワードを入れてください</h2>
            <input type="password" id="adminPass" class="input-style" placeholder="Password">
            <button class="btn-red" onclick="checkLogin()">ログイン</button>
        </div>

        <div id="adminContent" class="card">
            <label style="display:block; margin-bottom:15px; font-weight:bold; color:#666;">認証コード入力</label>
            <input type="text" id="checkInput" class="input-style" placeholder="00000-XXXXXX" oninput="runCheck()">

            <div id="resultDisplay" class="status-waiting">入力待ち...</div>
            
            <p style="font-size:11px; color:#aaa; margin-top:20px;">※認証コードを認証します</p>
        </div>
    </div>

    <script>
        // 指定のパスワード
        const ADMIN_PASSWORD = "dorugy";

        function checkLogin() {
            const val = document.getElementById('adminPass').value;
            if (val === ADMIN_PASSWORD) {
                sessionStorage.setItem('isDoruAdmin', 'true');
                showAdmin();
            } else { 
                alert("パスワードが違います"); 
            }
        }

        // ページ読み込み時の自動ログインチェック
        window.onload = function() {
            if (sessionStorage.getItem('isDoruAdmin') === 'true') {
                showAdmin();
            }
        };

        function showAdmin() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        }

        function runCheck() {
            const userInput = document.getElementById('checkInput').value.trim().toUpperCase();
            const result = document.getElementById('resultDisplay');

            // Num.html(発行側)が保存したコードを取得
            const correctCode = localStorage.getItem('doru_auth_code');

            if (userInput.length === 0) {
                result.innerText = "入力待ち...";
                result.className = "status-waiting";
                return;
            }

            // リアルタイム照合
            if (userInput === correctCode) {
                result.innerText = "認証可";
                result.className = "status-success";
            } else {
                result.innerText = "認証不可";
                result.className = "status-error";
            }
        }
    </script>
</body>
</html>
