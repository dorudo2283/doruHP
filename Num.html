<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>認証コード発行 - DORUDO SERVER</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f7fa; padding-top: 80px; text-align: center; }
    .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
    .menu-btn { font-size: 24px; cursor: pointer; }
    .header-title { font-weight: 700; font-size: 16px; color: #fff; text-decoration: none; }
    .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111; transition: 0.3s; z-index: 2000; padding-top: 60px; box-sizing: border-box; }
    .side-menu.open { left: 0; }
    .side-menu a { display: block; padding: 15px 25px; color: #ccc; text-decoration: none; text-align: left; border-bottom: 1px solid #222; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
    .overlay.show { display: block; }
    .container { width: 92%; max-width: 500px; margin: 40px auto; }
    .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); box-sizing: border-box; }
    .input-style { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #e0e0e0; background: #f9f9f9; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; text-align: center; font-weight: 600; }
    .input-style:focus { background: #fff; border-color: #0052cc; outline: none; }
    .code-container { position: relative; margin: 25px 0; }
    .code-display { font-size: 28px; font-weight: bold; color: #0052cc; padding: 18px; background: #e6f0fa; border-radius: 14px; border: 2px dashed #0052cc; cursor: pointer; letter-spacing: 2px; }
    .copy-icon-btn { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #0052cc; pointer-events: none; }
    .btn-main { display: flex; align-items: center; justify-content: center; background: #0052cc; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
    .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: rgba(17, 17, 17, 0.9); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 3000; transition: bottom 0.3s; }
    .toast.show { bottom: 40px; }
  </style>
</head>
<body>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
  <div id="sideMenu" class="side-menu">
    <a href="index.html">トップ</a>
    <a href="Num.html">認証コード発行</a>
    <a href="Admin.html">管理者パネル</a>
  </div>

  <div class="header-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <a href="index.html" class="header-title">DORUDO SERVER</a>
    <div style="width: 40px;"></div>
  </div>

  <div class="container">
    <h2>認証コード発行</h2>
    <div class="card">
        <input type="text" id="userNameInput" class="input-style" placeholder="名前を入力してください（ゲーマータグ,IDでも可）" maxlength="15">
        
        <div class="code-container" onclick="copyToClipboard()">
            <div id="codeArea" class="code-display">-----</div>
            <i class="fa-regular fa-copy copy-icon-btn"></i>
        </div>
        <button class="btn-main" onclick="generateMatrix6Code()">コードを発行する</button>
    </div>
  </div>

  <div id="copyToast" class="toast">コピーしました</div>

  <script>
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    let isGenerated = false;

    function generateMatrix6Code() {
        // 前半3桁を完全ランダム生成
        const head = Math.floor(100 + Math.random() * 900);
        const hStr = head.toString();

        const n1 = parseInt(hStr[0]);
        const n2 = parseInt(hStr[1]);
        const n3 = parseInt(hStr[2]);

        // 6桁用のシンプルマトリクス計算
        const c1 = (n1 + n2) % 10;
        const c2 = (n2 + n3) % 10;
        const c3 = (c1 + c2 + n3) % 10;

        const tailStr = `${c1}${c2}${c3}`;
        
        // 画面には純粋な6桁の数字（3桁-3桁）だけを表示
        document.getElementById('codeArea').innerText = hStr + "-" + tailStr;
        isGenerated = true;
    }

    function copyToClipboard() {
        if (!isGenerated) return;
        navigator.clipboard.writeText(document.getElementById('codeArea').innerText).then(() => {
            const toast = document.getElementById('copyToast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        });
    }
  </script>
</body>
</html>
