<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { margin: 0; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; padding-top: 80px; color: #1a1a1a; touch-action: manipulation; }
    .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
    .menu-btn { font-size: 24px; cursor: pointer; width: 40px; }
    .header-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; font-size: 16px; text-decoration: none; color: #fff; white-space: nowrap; letter-spacing: 1px; }
    .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111; color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; box-sizing: border-box; }
    .side-menu.open { left: 0; }
    .side-menu a { display: block; padding: 15px 25px; color: #ccc; text-decoration: none; font-size: 14px; border-bottom: 1px solid #222; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
    .overlay.show { display: block; }
    .container { width: 92%; max-width: 500px; margin: 40px auto; text-align: center; box-sizing: border-box; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #111; }
    .sub-text { color: #555; margin-bottom: 30px; font-size: 14px; line-height: 1.6; }
    
    /* カード・入力フォーム設定 */
    .card { background: white; padding: 30px; border-radius: 24px; border: 1px solid rgba(0, 0, 0, 0.06); box-shadow: 0 4px 20px rgba(0,0,0,0.03); box-sizing: border-box; width: 100%; }
    .input-style { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #e0e0e0; background: #f9f9f9; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; text-align: center; outline: none; font-weight: 600; }
    .input-style:focus { background: #fff; border-color: #0052cc; }

    .code-container { position: relative; margin: 25px 0; }
    .code-display { font-size: 22px; font-weight: bold; color: #0052cc; letter-spacing: 1px; padding: 18px 60px 18px 18px; background: #e6f0fa; border-radius: 14px; border: 2px dashed #0052cc; text-align: center; cursor: pointer; position: relative; overflow: hidden; transition: 0.2s; word-break: break-all; }
    .code-display:active { background: #dbeafc; }
    .copy-icon-btn { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #0052cc; cursor: pointer; pointer-events: none; }
    
    .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: rgba(17, 17, 17, 0.9); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 3000; transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: none; }
    .toast.show { bottom: 40px; }
    
    /* 浮かび上がるボタン */
    .btn-main { display: flex; align-items: center; justify-content: center; background: #0052cc; color: white; border: 1px solid #0047b3; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; box-shadow: 0 2px 4px rgba(0, 82, 204, 0.1); transition: transform 0.25s, box-shadow 0.25s, background 0.2s; cursor: pointer; width: 100%; box-sizing: border-box; }
    @media (hover: hover) {
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 82, 204, 0.25); background: #0066ff; }
    }
    .btn-main:active { transform: translateY(1px); background: #0047b3; }
    .back-link { display: block; text-align: center; margin: 40px 0; color: #888; text-decoration: none; font-size: 14px; font-weight: 500; }
    footer { text-align: center; padding: 40px 0; color: #aaa; font-size: 11px; }
  </style>

<body>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
  <div id="sideMenu" class="side-menu">

    <a href="Admin.html">管理者パネル</a>
  </div>

  <div class="header-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <a href="index.html" class="header-title">DORUDO SERVER</a>
    <div style="width: 40px;"></div>
  </div>

  <div class="container">
    <h1>認証コード発行</h1>
    <p class="sub-text">名前を入力してボタンを押してください。また、このコードは決して他人に教えず、鯖主に直接　DM　で伝えてください。</p>

    <div class="card">
        <input type="text" id="userNameInput" class="input-style" placeholder="あなたの名前を入力（例: TANAKA）" maxlength="12">
        
        <div class="code-container" onclick="copyToClipboard()">
            <div id="codeArea" class="code-display">名前を入力して発行してください</div>
            <i class="fa-regular fa-copy copy-icon-btn"></i>
        </div>
        <button class="btn-main" onclick="generateRSANameCode()">コードを発行する</button>
    </div>
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> トップに戻る</a>
  </div>

  <div id="copyToast" class="toast"><i class="fa-solid fa-circle-check" style="color: #4caf50; margin-right: 8px;"></i> コードをコピーしました</div>

  <footer><p>©2026 DORUDO SERVER Official Website</p></footer>

  <script>
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    const E = 7n;
    const N = 3233n;
    let isGenerated = false;

    function generateRSANameCode() {
        const nameInput = document.getElementById('userNameInput').value.trim();
        if (!nameInput) {
            alert("名前を入力してください。");
            return;
        }

        // 1. 名前の文字を簡易ハッシュ化して、100〜999の3桁(M)に圧縮
        let nameHash = 0;
        for (let i = 0; i < nameInput.length; i++) {
            nameHash += nameInput.charCodeAt(i);
        }
        // 下2桁を取り出し、頭に「5」をつけて、100〜999の範囲に絶対に収まる3桁のメッセージ(M)を作成
        const M = BigInt(500 + (nameHash % 100));

        // 2. RSA暗号化計算 (C = M^E mod N)
        let C = 1n;
        let base = M % N;
        let exp = E;
        while (exp > 0n) {
            if (exp % 2n === 1n) C = (C * base) % N;
            base = (base * base) % N;
            exp = exp / 2n;
        }

        // 3. 暗号を4桁固定の16進数に変換
        const hexCipher = C.toString(16).toUpperCase().padStart(4, '0');
        
        // 4. 管理者がコピペしやすいよう、[入力した名前]を可視化してハイフンで合体
        // 例: TANAKA-A3BF
        document.getElementById('codeArea').innerText = nameInput + "-" + hexCipher;
        isGenerated = true;
    }

    function copyToClipboard() {
        if (!isGenerated) return;
        const codeText = document.getElementById('codeArea').innerText;
        navigator.clipboard.writeText(codeText).then(() => {
            const toast = document.getElementById('copyToast');
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        });
    }
  </script>
</body>
