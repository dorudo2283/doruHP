<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認証コード発行 - DORUDO SERVER</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f7ff; padding-top: 80px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 24px; display: inline-block; width: 90%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .code-display { font-size: 24px; font-weight: bold; color: #0052cc; letter-spacing: 1px; margin: 20px 0; padding: 15px; background: #e6f0fa; border-radius: 12px; border: 2px dashed #0052cc; }
        .btn { background: #0052cc; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>認証コード発行</h2>
        <p style="color:#666; font-size:14px; line-height:1.5;">認証コードを発行します。<br>この画面のソースコードを解析しても偽造は不可能です。</p>
        <div id="codeArea" class="code-display">-----</div>
        <button class="btn" onclick="generateRSACode()">コードを発行する</button>
    </div>

    <script>
        // RSA公開鍵パラメータ（天才に見られても全く問題のない数字）
        const E = 7n;
        const N = 3233n; // 61 * 53 から生成された法

        function generateRSACode() {
            // 1. 基盤となるランダムな秘密の値を生成 (100〜999)
            const seed = Math.floor(100 + Math.random() * 900);
            
            // ドル鯖独自の「本物の証」として、末尾の数字を計算（例: 偶数奇数の特殊な並び）
            // ここでは seed の百の位と十の位を足した数が一の位になるような特殊な「本物スタンプ」を埋め込む
            const baseNum = Math.floor(10 + Math.random() * 80); // 2桁
            const checkDigit = (Math.floor(baseNum / 10) + (baseNum % 10)) % 10;
            const M = BigInt(baseNum * 10 + checkDigit); // 3桁の「スタンプ付き本物データ」

            // 2. RSA暗号化計算: C = M^e mod n
            let C = 1n;
            let base = M % N;
            let exp = E;
            while (exp > 0n) {
                if (exp % 2n === 1n) C = (C * base) % N;
                base = (base * base) % N;
                exp = exp / 2n;
            }

            // 3. 視認性と入力しやすさを両立した16進数4桁コードを生成
            const hexCipher = C.toString(16).toUpperCase().padStart(4, '0');
            
            // 4. 偽装用トラップとしてダミーの値を結合し「12345-ABCD」の形にする
            const dummy = Math.floor(10000 + Math.random() * 90000).toString();
            const finalCode = dummy + "-" + hexCipher;
            
            document.getElementById('codeArea').innerText = finalCode;
        }
    </script>
</body>
</html>
