<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ - DORUDO SERVER</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .qa-item { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
    .q { font-weight: bold; color: #1976d2; margin-bottom: 10px; display: block; }
    .a { font-size: 14px; color: #555; }
    .back-btn { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="text-align:center;">よくある質問</h2>
    
    <div class="qa-item">
      <span class="q">Q. サーバーに入れません。</span>
      <p class="a">A. まず、最新のマイクラのバージョンであることを確認してください。また、認証コードが正しく入力されているかも確認してください。</p>
    </div>

    <div class="qa-item">
      <span class="q">Q. 認証コードはどこで使いますか？</span>
      <p class="a">A. サーバーに接続した際、ロビーでの認証に使用します。大切にメモしておいてください。</p>
    </div>

    <a href="index.html" class="back-btn">← ホームに戻る</a>
  </div>
</body>
</html>
