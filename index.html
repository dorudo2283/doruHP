<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DORUDO SERVER 公式</title>

  <style>
    /* ベースデザイン */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding-top: 60px;
      color: #333;
      touch-action: manipulation;
    }

    /* ヘッダー */
    .header-bar {
      position: fixed; top: 0; left: 0; width: 100%; height: 60px;
      background: #111; color: #fff; display: flex;
      align-items: center; justify-content: space-between;
      padding: 0 20px; box-sizing: border-box; z-index: 1000;
    }
    .menu-btn { font-size: 24px; cursor: pointer; width: 40px; }
    .header-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 18px; text-decoration: none; color: #fff; white-space: nowrap; }

    /* サイドメニュー */
    .side-menu {
      position: fixed; top: 0; left: -250px; width: 250px; height: 100%;
      background: #111; color: white; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2000; padding-top: 60px; box-sizing: border-box;
    }
    .side-menu.open { left: 0; }
    .side-menu a { display: block; padding: 15px 25px; color: white; text-decoration: none; font-size: 14px; border-bottom: 1px solid #333; }

    /* オーバーレイ */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
    .overlay.show { display: block; }

    /* メインコンテナ */
    .container { width: 92%; max-width: 600px; margin: 30px auto; text-align: center; box-sizing: border-box; }
    h1 { margin-bottom: 5px; font-size: clamp(32px, 9vw, 48px); color: #111; letter-spacing: -1px; }
    .sub-text { color: #666; margin-bottom: 35px; font-size: 14px; line-height: 1.5; }

    /* グループ見出し */
    .group-title {
      text-align: left;
      font-size: 11px;
      font-weight: bold;
      color: #aaa;
      margin: 25px 0 10px 5px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ボタン共通スタイル */
    .button {
      display: flex; align-items: center; justify-content: center;
      background: white; color: black; text-decoration: none;
      padding: 18px; margin-bottom: 10px; border: 1px solid #ddd;
      border-radius: 14px; font-size: 17px; transition: 0.2s;
      box-sizing: border-box; width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .button:active { transform: scale(0.98); background: #f0f0f0; }

    /* 各種ボタンカラー */
    .btn-update { background: #e3f2fd; border-color: #bbdefb; color: #1976d2; font-weight: bold; }
    .btn-main { background: #ff4d4d; color: white; border-color: #ff4d4d; font-weight: bold; box-shadow: 0 4px 12px rgba(255,77,77,0.2); }

    /* グリッドレイアウト */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .btn-grid .button {
      font-size: 14px;
      padding: 16px 5px;
      margin-bottom: 0;
    }

    /* フッター */
    footer { text-align: center; padding: 40px 0; color: #999; font-size: 12px; }
    .responsive-banner { display: block; width: 100%; margin: 20px 0; overflow: hidden; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .banner-img { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <div id="sideMenu" class="side-menu">
    <a href="index.html">トップ</a>
    <a href="updates.html">アプデ情報</a>
    <a href="Num.html">認証コード発行</a>
    <a href="access.html">鯖の入り方・情報</a>
    <a href="rules.html">ルール</a>
    <a href="Q.html">よくある質問</a>
    <a href="GofList.html">ワールド一覧</a>
    <a href="members.html">メンバー紹介</a>
    <a href="Admin.html">管理者パネル</a>
  </div>

  <div class="header-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <a href="index.html" class="header-title">DORUDO SERVER</a>
    <div style="width: 40px;"></div>
  </div>

  <div class="container">
    <h1>DORUDO SERVER</h1>
    <p class="sub-text">マイクラ統合版 参加型サーバー<br>ドル鯖公式ホームページ</p>

    <div class="group-title">News</div>
    <a href="updates.html" class="button btn-update">アプデ情報を確認する</a>

    <div class="group-title">Join Us</div>
    <a href="Num.html" class="button btn-main">認証コード発行</a>
    <a href="access.html" class="button">サーバーの入り方・情報</a>
    
    <div class="group-title">Information</div>
    <div class="btn-grid">
      <a href="rules.html" class="button">ルール</a>
      <a href="Q.html" class="button">よくある質問</a>
    </div>
    <a href="GofList.html" class="button">公開ワールド一覧・攻略</a>

    <div class="group-title">Community</div>
    <div class="btn-grid">
      <a href="members.html" class="button">メンバー紹介</a>
      <a href="addons.html" class="button">アドオン紹介</a>
    </div>
    <div class="btn-grid">
      <a href="Links.html" class="button">リンク集</a>
      <a href="credit.html" class="button">クレジット</a>
    </div>
  </div>

  <footer>
    <a href="https://nagyou.net" class="responsive-banner">
      <img src="dorudo_banner.png" alt="Host by NAGYOU" class="banner-img">
    </a>
    <p>©2026 DORUDO SERVER Official Website</p>
  </footer>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('sideMenu');
      const overlay = document.getElementById('overlay');
      menu.classList.toggle('open');
      overlay.classList.toggle('show');
    }
  </script>

</body>
</html>
