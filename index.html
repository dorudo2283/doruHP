<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DORUDO SERVER 公式</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* 基本設定（無駄な色を排除し、引き締まった配色に） */
    body { margin: 0; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; background: #fafafa; padding-top: 60px; color: #1a1a1a; touch-action: manipulation; }
    
    /* ヘッダー */
    .header-bar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111; color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
    .menu-btn { font-size: 24px; cursor: pointer; width: 40px; }
    .header-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; font-size: 16px; text-decoration: none; color: #fff; white-space: nowrap; letter-spacing: 1px; }
    
    /* サイドメニュー */
    .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111; color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; box-sizing: border-box; }
    .side-menu.open { left: 0; }
    .side-menu a { display: block; padding: 15px 25px; color: #ccc; text-decoration: none; font-size: 14px; border-bottom: 1px solid #222; transition: 0.2s; }
    .side-menu a:hover { color: #fff; background: #222; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
    .overlay.show { display: block; }

    /* ヒーローセクション */
    .hero-container {
        position: relative;
        width: 100%;
        height: 280px;
        overflow: hidden;
        display: block;
        background: #111;
    }
    .hero-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
    }
    
    /* コンテンツエリア */
    .container { width: 92%; max-width: 500px; margin: 40px auto; text-align: center; box-sizing: border-box; }
    .sub-text { color: #666; margin-bottom: 40px; font-size: 14px; line-height: 1.6; font-weight: 400; }
    
    /* グループタイトル（余白とフォントサイズを緻密に調整） */
    .group-title { text-align: left; font-size: 11px; font-weight: 700; color: #999; margin: 35px 0 12px 4px; letter-spacing: 2px; text-transform: uppercase; }
    
    /* ボタンデザイン（AI感のあるグラデや派手な影を廃止、フラットかつ強固に） */
    .button { display: flex; align-items: center; justify-content: center; background: white; color: #1a1a1a; text-decoration: none; padding: 16px; margin-bottom: 12px; border: 1px solid #e5e5e5; border-radius: 12px; font-size: 15px; font-weight: 600; transition: 0.2s; box-sizing: border-box; width: 100%; }
    .button:active { transform: scale(0.98); background: #f5f5f5; border-color: #ddd; }
    
    /* アプデ情報：ゲームらしさを出す控えめなブルー */
    .btn-update { background: #f0f6ff; border-color: #d8e7fe; color: #0066cc; }
    .btn-update:active { background: #e1edfe; }
    
    /* メインボタン：ソリッドな黒で引き締める */
    .btn-main { background: #111; color: white; border-color: #111; }
    .btn-main:active { background: #333; border-color: #333; }
    
    /* グリッド配置 */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .btn-grid .button { font-size: 14px; padding: 16px 5px; margin-bottom: 0; }
    
    footer { text-align: center; padding: 60px 0 40px 0; color: #aaa; font-size: 11px; letter-spacing: 0.5px; }
  </style>
</head>
<body>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
  <div id="sideMenu" class="side-menu">
    <a href="index.html">トップ</a>
    <a href="updates.html">アプデ情報</a>
    <a href="Num.html">認証コード発行</a>
    <a href="access.html">鯖の入り方・情報</a>
    <a href="rules.html">ルール</a>
    <a href="Q.html">よくある質問</a>
    <a href="GofList.html">ワールド一覧</a>
    <a href="members.html">メンバー紹介</a>
    <a href="Admin.html">管理者パネル</a>
  </div>

  <div class="header-bar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <a href="index.html" class="header-title">DORUDO SERVER</a>
    <div style="width: 40px;"></div>
  </div>

  <div class="hero-container">
    <img src="Top.png" alt="DORUDO SERVER" class="hero-image">
  </div>

  <div class="container">
    <p class="sub-text">マイクラ統合版 参加型サーバー<br>ドル鯖公式ホームページへようこそ</p>

    <div class="group-title">NEWS</div>
    <a href="updates.html" class="button btn-update">アプデ情報を確認する</a>

    <div class="group-title">JOIN</div>
    <a href="Num.html" class="button btn-main">認証コード発行</a>
    <a href="access.html" class="button">サーバーの入り方・情報</a>

    <div class="group-title">INFORMATION</div>
    <div class="btn-grid">
      <a href="rules.html" class="button">ルール</a>
      <a href="Q.html" class="button">よくある質問</a>
    </div>
    <a href="GofList.html" class="button">公開ワールド一覧・攻略</a>

    <div class="group-title">COMMUNITY</div>
    <div class="btn-grid">
      <a href="members.html" class="button">メンバー紹介</a>
      <a href="addons.html" class="button">アドオン紹介</a>
    </div>
    <div class="btn-grid">
      <a href="Links.html" class="button">リンク集</a>
      <a href="credit.html" class="button">クレジット</a>
    </div>
  </div>

  <footer>
    <p>©2026 DORUDO SERVER Official Website</p>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }
  </script>
</body>
</html>
